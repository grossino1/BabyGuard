version: "3.8"

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
    depends_on:
      - mosquitto
      - influxdb

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=iomt-lab
      - DOCKER_INFLUXDB_INIT_BUCKET=babyguard_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=VHKmLZuJVqWxdmEc0djF3mA1UTrYvNSYrHrJAz58cXn9g5DLUmvXMOMOqISFy0CsU4-QepolBSEra6aMSZ748g==

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - influxdb

  backend:
    build: ./backend
    container_name: medical_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      INFLUXDB_TOKEN: VHKmLZuJVqWxdmEc0djF3mA1UTrYvNSYrHrJAz58cXn9g5DLUmvXMOMOqISFy0CsU4-QepolBSEra6aMSZ748g==
      INFLUXDB_ORG: iomt-lab
      INFLUXDB_URL: http://influxdb:8086
    depends_on:
      - mosquitto

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: medical_mobile
    working_dir: /workspace/BabyGuard
    volumes:
      - ./mobile/:/workspace
      # ./mobile/applicazione:/workspace/applicazione
      # - expo-node-modules_app_websocket:/workspace/app_websocket/node_modules
    ports:
      # Metro bundler / Expo
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      # Utile quando Expo gira dentro Docker e deve essere raggiunto dal telefono con Expo Go
      - EXPO_DEVTOOLS_LISTEN_ADDRESS="0.0.0.0"
      - EXPO_PUBLIC_API_URL="http://${HOST_IP}:${API_PORT}"
      - EXPO_PUBLIC_WS_URL="ws://${HOST_IP}:${API_PORT}/ws"
      - EXPO_PUBLIC_SSE_URL="http://${HOST_IP}:${API_PORT}/events"
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    stdin_open: true
    tty: true
    command: npx expo start --lan --go

volumes:
  expo-node-modules_app_websocket: